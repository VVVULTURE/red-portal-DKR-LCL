<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Red Portal Launcher</title>
    <style>
      body { background: #0e1018; color: white; font-family: sans-serif; margin: 0; }
      #launcher { text-align: center; border: 2px solid rgba(255,38,38,0.4); padding: 60px; border-radius: 12px; background: rgba(255,255,255,0.05) }
      h1 { margin-bottom: 1rem; letter-spacing: -1px }
      span { color: #ff3b30 }
      button { padding: 14px 48px; font-size: 1.2rem; border: none; background: #dc2626; color: white; cursor: pointer; transition: transform 0.2s ease; position: relative }
      button:hover { transform: scale(1.05) }
      #status { margin-top: 20px; color: rgba(255,255,255,0.6); min-height: 1.5em; font-size: 0.9rem }

    iframe { border: none; width: 100%; height: 80vh; display: block; margin-top: 32px }
  </style>
</head>
<body id="wrapper">
  <div class="launcher" id="starter">
    <h1>Red Portal Launcher</h1>
    <button onclick="launch()">Launch Portal</button>
    <p id="status"></p>
  </div>

  <iframe id="portal-frame" src="about:blank" style="display:none"></iframe>

  <script>
    const PORTAL_BASE = 'https://red-portal-service.koyeb.app/';

    function launch() {
      const btn = document.getElementById("launchBtn");
      const status = document.getElementById("status");
      const starter = document.getElementById("starter");
      const frame = document.getElementById("portal-frame");

      btn.disabled = true;
      status.innerHTML = "Preparing the portal...";

      fetch(PORTAL_BASE)
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then((html) => {
          // Fix relative paths by injecting the base tag into the fetched HTML
          const fixedHtml = html.replace(/<head[^>]*>/i, m => `${m}<base href="${PORTAL_BASE}">`);

          const blobUrl = URL.createObjectURL(new Blob([fixedHtml], { type: 'text/html' }));
          frame.src = blobUrl;
          starter.style.display = "none";
          status.innerHTML = " Portal loaded below.";
        })
        .catch((err) => {
          console.error(err);
          window.open(PORTAL_BASE, '_blank');
          btn.disabled = false;
          status.innerText = " Could not load inline - opening full site instead.";
        });

      btn.disabled = false;
    }
  </script>
</body>
</html>
